services:
  pipeline-postgres:
    image: postgres:17-alpine
    container_name: lang-comp-pipeline-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: langcomp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${PIPELINE_PG_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d langcomp"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pipeline_pg_data:/var/lib/postgresql/data

volumes:
  pipeline_pg_data:
